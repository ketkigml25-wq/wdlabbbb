<!DOCTYPE html>
<html>
<head>
    <title>Hackathon & Seminar Registration</title>
</head>
<body>

<h2>Hackathon & Seminar Registration Form</h2>

<form>

    <!-- Personal Details -->
    <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Mobile Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender">
        <label for="other">Other</label>
    </fieldset>

    <br>

    <!-- Academic Details -->
    <fieldset>
        <legend>Academic Details</legend>

        <label for="college">College Name:</label><br>
        <input type="text" id="college" name="college" required><br><br>

        <label for="course">Course:</label><br>
        <select id="course" name="course" required>
            <option value="">--Select--</option>
            <option>B.Tech</option>
            <option>B.Sc</option>
            <option>BCA</option>
            <option>Diploma</option>
        </select><br><br>

        <label for="year">Year:</label><br>
        <select id="year" name="year" required>
            <option value="">--Select--</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>Final Year</option>
        </select>
    </fieldset>

    <br>

    <!-- Event Selection -->
    <fieldset>
        <legend>Event Selection</legend>

        <label>Choose Event:</label><br>

        <input type="radio" id="hackathon" name="event" required>
        <label for="hackathon">Hackathon</label>

        <input type="radio" id="seminar" name="event">
        <label for="seminar">Seminar</label>

        <input type="radio" id="both" name="event">
        <label for="both">Both</label>
    </fieldset>

    <br>

    <!-- Hackathon Details -->
    <fieldset>
        <legend>Hackathon Details</legend>

        <label for="team">Team Name:</label><br>
        <input type="text" id="team" name="team"><br><br>

        <label for="members">Number of Team Members:</label><br>
        <select id="members" name="members">
            <option value="">--Select--</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
        </select><br><br>

        <label>Preferred Tech Stack:</label><br>

        <input type="checkbox" id="web" name="tech" value="Web Dev">
        <label for="web">Web Development</label><br>

        <input type="checkbox" id="ai" name="tech" value="AI/ML">
        <label for="ai">AI / ML</label><br>

        <input type="checkbox" id="app" name="tech" value="App Dev">
        <label for="app">App Development</label><br>

        <input type="checkbox" id="blockchain" name="tech" value="Blockchain">
        <label for="blockchain">Blockchain</label>
    </fieldset>

    <br>

    <!-- Seminar Preferences -->
    <fieldset>
        <legend>Seminar Preferences</legend>

        <label>Select Topics:</label><br>

        <input type="checkbox" id="cyber" name="topics">
        <label for="cyber">Cyber Security</label><br>

        <input type="checkbox" id="data" name="topics">
        <label for="data">Data Science</label><br>

        <input type="checkbox" id="cloud" name="topics">
        <label for="cloud">Cloud Computing</label><br>

        <input type="checkbox" id="startup" name="topics">
        <label for="startup">Startup & Innovation</label>
    </fieldset>

    <br>

    <!-- Additional Info -->
    <fieldset>
        <legend>Additional Information</legend>

        <label for="state">State:</label><br>
        <select id="state" name="state" required>
            <option value="">--Select--</option>
            <option>Maharashtra</option>
            <option>Gujarat</option>
            <option>Delhi</option>
            <option>Karnataka</option>
        </select><br><br>

        <label for="msg">Why do you want to participate?</label><br>
        <textarea id="msg" rows="4" cols="30"></textarea>
    </fieldset>

    <br>

    <input type="submit" value="Register">
    <input type="reset" value="Reset">

</form>

</body>
</html>
