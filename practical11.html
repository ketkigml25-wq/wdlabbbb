<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML5 API Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    padding:30px;
    background: linear-gradient(135deg, #dbeafe, #ede9fe, #fce7f3);
    color:#1e293b;
}

.container{
    max-width:1000px;
    margin:auto;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:38px;
    color:#1d4ed8;
}

header p{
    margin-top:8px;
    color:#475569;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
}

.card{
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border-radius:18px;
    padding:22px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    transition:0.35s ease;
}

.card:hover{
    transform: translateY(-6px);
}

.card h2{
    color:#2563eb;
    margin-bottom:14px;
}

/* drag */
#drag{
    width:110px;
    padding:12px;
    text-align:center;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:move;
}

#drop{
    margin-top:14px;
    height:110px;
    border:2px dashed #94a3b8;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f8fafc;
}

/* buttons */
button{
    padding:9px 14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform: scale(1.05);
}

/* input */
input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
}

p{
    margin-top:10px;
    color:#334155;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<header>
    <h1>HTML5 API Showcase</h1>
    <p>Drag & Drop, Geolocation and Web Storage</p>
</header>

<div class="grid">

    <!-- Drag and Drop -->
    <div class="card">
        <h2>Drag & Drop</h2>

        <div id="drag" draggable="true" ondragstart="drag(event)">
            Drag Me
        </div>

        <div id="drop" ondrop="drop(event)" ondragover="allowDrop(event)">
            Drop Here
        </div>
    </div>

    <!-- Geolocation -->
    <div class="card">
        <h2>Geolocation</h2>

        <button onclick="getLocation()">Get Location</button>

        <p id="location">Location will appear here</p>
    </div>

    <!-- Web Storage -->
    <div class="card">
        <h2>Web Storage</h2>

        <input type="text" id="name" placeholder="Enter your name">

        <button onclick="saveName()">Save</button>
        <button onclick="showName()">Show</button>

        <p id="result">Saved name will appear here</p>
    </div>

</div>
</div>

<script>
function allowDrop(event){
    event.preventDefault();
}

function drag(event){
    event.dataTransfer.setData("text", event.target.id);
}

function drop(event){
    event.preventDefault();
    let data = event.dataTransfer.getData("text");
    event.target.appendChild(document.getElementById(data));
}

function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(position){
            document.getElementById("location").innerHTML =
                "Latitude: " + position.coords.latitude +
                "<br>Longitude: " + position.coords.longitude;
        });
    } else {
        document.getElementById("location").innerHTML =
            "Geolocation not supported.";
    }
}

function saveName(){
    let name = document.getElementById("name").value;
    localStorage.setItem("username", name);
}

function showName(){
    let saved = localStorage.getItem("username");
    document.getElementById("result").innerHTML =
        "Saved Name: " + saved;
}
</script>

</body>
</html>
